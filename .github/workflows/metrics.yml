name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ─── SVG 1: Linguagens + Achievements ───────────────────────────────────
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: gabriel-mkv
          template: classic
          filename: metrics.base.svg

          config_display: large
          config_timezone: America/Sao_Paulo
          config_animations: yes

          base: header
          base_indepth: yes
          repositories: 60
          repositories_affiliations: owner, collaborator
          commits_authoring: gabriel-mkv, gabrielhsmendonca@gmail.com, gabrielmkv.dev@gmail.com
          plugins_errors_fatal: false

          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 200
          plugin_languages_analysis_timeout_repositories: 50
          plugin_languages_categories: programming
          plugin_languages_colors: github
          plugin_languages_details: lines
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_ignored: scss, css, html, qml, perl, lua, ruby, dockerfile, markdown, mdx

          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: no
          plugin_achievements_display: compact
          plugin_achievements_limit: 6

      # ─── SVG 2: Atividade recente ────────────────────────────────────────────
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          config_padding: 6, 10%
          user: gabriel-mkv
          template: classic
          filename: metrics.activity.svg

          config_display: large
          config_timezone: America/Sao_Paulo
          config_animations: yes

          base: activity
          base_indepth: yes
          repositories: 60
          repositories_affiliations: owner, collaborator
          commits_authoring: gabriel-mkv, gabrielhsmendonca@gmail.com, gabrielmkv.dev@gmail.com
          plugins_errors_fatal: false
