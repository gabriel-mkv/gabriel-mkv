name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: gabriel-mkv
          template: classic
          filename: metrics.base.svg
          config_display: large
          config_timezone: America/Sao_Paulo
          config_animations: yes
          base: header
          base_indepth: yes
          repositories: 60
          repositories_affiliations: owner, collaborator, member
          commits_authoring: gabriel-mkv, Gabriel Henrique, gabrielhsmendonca@gmail.com, gabrielmkv.dev@gmail.com
          plugins_errors_fatal: false
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 200
          plugin_languages_analysis_timeout_repositories: 50
          plugin_languages_categories: programming
          plugin_languages_colors: github
          plugin_languages_details: lines
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_ignored: scss, css, html, qml, perl, lua, ruby, dockerfile, markdown, mdx, viml, shell
          plugin_code: yes
          plugin_code_languages: "java"
          plugin_code_load: 400
          plugin_code_days: 14
          plugin_code_visibility: public
